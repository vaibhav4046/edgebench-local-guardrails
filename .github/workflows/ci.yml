name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy edgebench backend

      - name: Pytest
        run: pytest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Frontend build
        run: |
          cd frontend
          npm install
          npm run build
