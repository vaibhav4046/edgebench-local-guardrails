# Sample run request payload for backend POST /api/v1/runs

dataset_path: data/smoke_prompts_10.jsonl
models_config_path: config/models.yaml
benchmark_config_path: config/benchmark.yaml
results_root: results
repeats: 3
request_timeout_seconds: 120
job_timeout_seconds: 0
deterministic_mode: false
enable_temperature_sweep: true
temperatures: [0.0, 0.2, 0.5, 0.8]
scorer_name: exact_json

sampling_override:
  temperature: 0.2
  top_p: 0.9
  top_k: 40
  seed: 42
  num_predict: 256

model_overrides:
  - model_key: llama3.2-mini
    tag: llama3.2:1b-instruct-q4_K_M
    base_url: http://127.0.0.1:11434
    enabled: true
  - model_key: 54Mini
    tag: 54Mini:latest
    base_url: http://127.0.0.1:11434
    enabled: true
  - model_key: mistral-7b
    tag: mistral:7b-instruct
    base_url: http://127.0.0.1:11434
    enabled: true
